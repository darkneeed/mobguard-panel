name: Web Frontend

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-frontend.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-frontend.yml"

jobs:
  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Clean install
        run: npm ci

      - name: Frontend tests
        run: npm test -- --run

      - name: Frontend build
        run: npm run build

      - name: Docker web image build
        run: docker build -f Dockerfile .
