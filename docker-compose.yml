services:
  mobguard-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: mobguard-core
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BAN_SYSTEM_DIR: /opt/mobguard/runtime
      MOBGUARD_ENV_FILE: /opt/mobguard/.env
    volumes:
      - ./.env:/opt/mobguard/.env
      - ./runtime:/opt/mobguard/runtime
      - ${REMNANODE_ACCESS_LOG:-/var/log/remnanode/access.log}:/var/log/remnanode/access.log:ro
    depends_on:
      mobguard-api:
        condition: service_healthy

  mobguard-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mobguard-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BAN_SYSTEM_DIR: /opt/mobguard/runtime
      MOBGUARD_ENV_FILE: /opt/mobguard/.env
    volumes:
      - ./.env:/opt/mobguard/.env
      - ./runtime:/opt/mobguard/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  mobguard-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mobguard-web
    restart: unless-stopped
    depends_on:
      mobguard-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
